name: Scrape All Sites

on:
  schedule:
    # Run every 4 hours
    - cron: "0 */4 * * *"
  workflow_dispatch:
    inputs:
      site:
        description: "Site to scrape (site_id or 'all')"
        required: false
        default: "all"
        type: string

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  AWS_STORAGE_BUCKET_NAME: ${{ secrets.AWS_STORAGE_BUCKET_NAME }}
  AWS_S3_REGION_NAME: us-east-1
  GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

jobs:
  # ---------------------------------------------------------------
  # Job 1: Cal eProcure (single site, longest running)
  # ---------------------------------------------------------------
  caleprocure:
    name: "Cal eProcure"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.site == 'all' ||
      github.event.inputs.site == 'caleprocure'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: webscraping/v2/requirements.txt

      - name: Install dependencies
        run: pip install -r webscraping/v2/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Scrape Cal eProcure
        run: python -m webscraping.v2.orchestrator.runner --site caleprocure
        timeout-minutes: 45

  # ---------------------------------------------------------------
  # Job 2: All PlanetBids sites (sequential within one job)
  # ---------------------------------------------------------------
  planetbids:
    name: "PlanetBids (all agencies)"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.site == 'all' ||
      startsWith(github.event.inputs.site, 'planetbids')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: webscraping/v2/requirements.txt

      - name: Install dependencies
        run: pip install -r webscraping/v2/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Scrape PlanetBids sites
        run: |
          SITE_INPUT="${{ github.event.inputs.site }}"
          if [[ "$SITE_INPUT" == "all" || "$SITE_INPUT" == "" ]]; then
            # Run all PlanetBids sites sequentially
            python -c "
          from webscraping.v2.orchestrator.runner import SITE_REGISTRY
          for sid in SITE_REGISTRY:
              if sid.startswith('planetbids'):
                  print(sid)
          " | while read site_id; do
              echo "=== Scraping $site_id ==="
              python -m webscraping.v2.orchestrator.runner --site "$site_id" || echo "WARN: $site_id failed"
            done
          else
            # Run a single PlanetBids site
            python -m webscraping.v2.orchestrator.runner --site "$SITE_INPUT"
          fi
        timeout-minutes: 120

  # ---------------------------------------------------------------
  # Job 3: All BidSync sites (sequential within one job)
  # ---------------------------------------------------------------
  bidsync:
    name: "BidSync (all agencies)"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.site == 'all' ||
      startsWith(github.event.inputs.site, 'bidsync')
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: webscraping/v2/requirements.txt

      - name: Install dependencies
        run: pip install -r webscraping/v2/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Scrape BidSync sites
        run: |
          SITE_INPUT="${{ github.event.inputs.site }}"
          if [[ "$SITE_INPUT" == "all" || "$SITE_INPUT" == "" ]]; then
            # Run all BidSync sites sequentially
            python -c "
          from webscraping.v2.orchestrator.runner import SITE_REGISTRY
          for sid in SITE_REGISTRY:
              if sid.startswith('bidsync'):
                  print(sid)
          " | while read site_id; do
              echo "=== Scraping $site_id ==="
              python -m webscraping.v2.orchestrator.runner --site "$site_id" || echo "WARN: $site_id failed"
            done
          else
            # Run a single BidSync site
            python -m webscraping.v2.orchestrator.runner --site "$SITE_INPUT"
          fi
        timeout-minutes: 60

  # ---------------------------------------------------------------
  # Job 4: Agentic sites (LA City, SF City)
  # ---------------------------------------------------------------
  agentic:
    name: "Agentic sites"
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'schedule' ||
      github.event.inputs.site == 'all' ||
      github.event.inputs.site == 'la_city' ||
      github.event.inputs.site == 'sf_city'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: webscraping/v2/requirements.txt

      - name: Install dependencies
        run: pip install -r webscraping/v2/requirements.txt

      - name: Install Playwright browsers
        run: python -m playwright install chromium --with-deps

      - name: Scrape agentic sites
        run: |
          SITE_INPUT="${{ github.event.inputs.site }}"
          if [[ "$SITE_INPUT" == "all" || "$SITE_INPUT" == "" ]]; then
            for site_id in la_city sf_city; do
              echo "=== Scraping $site_id ==="
              python -m webscraping.v2.orchestrator.runner --site "$site_id" || echo "WARN: $site_id failed"
            done
          else
            python -m webscraping.v2.orchestrator.runner --site "$SITE_INPUT"
          fi
        timeout-minutes: 30

  # ---------------------------------------------------------------
  # Summary: report results
  # ---------------------------------------------------------------
  summary:
    name: "Report results"
    runs-on: ubuntu-latest
    needs: [caleprocure, planetbids, bidsync, agentic]
    if: always()
    steps:
      - name: Summarize scrape results
        run: |
          echo "## Scrape Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Cal eProcure | ${{ needs.caleprocure.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PlanetBids | ${{ needs.planetbids.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| BidSync | ${{ needs.bidsync.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agentic | ${{ needs.agentic.result }} |" >> $GITHUB_STEP_SUMMARY
